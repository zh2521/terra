# All keys in this YAML file must be in capital letters since
# they will be treated as environmental variables.

job_requirement:
  LSB_DEFAULT_USERGROUP: team361  # The user group to be used for scheduling the job.
  QUEUE: "training-parallel" # "gpu-lotfollahi", "gpu-lotfollahi-train"  # The job queue to be used for scheduling the job.
  NUM_NODES: 1  # Number of compute nodes required for the job.
  NUM_GPUS_NODE: 1  # Number of GPUs per node.
  NUM_PROCESSES_NODE: 24  # Number of processes per node.
  MEM_NODE: 64  # Memory allocated per node (in GB).
  
infiniband:
  NCCL_IB_DISABLE: 1  # 1: Disable InfiniBand, 0: Enable InfiniBand

environment:
  ENV_PATH: "${TERRA_ENV_PATH}"  # Path to the environment to be activated.

artifact:
  ARTIFACT_LOCATION: "${TERRA_ARTIFACTS_DIR}/xhs49-1b_1p"  # Path to store the artifacts.
  WAREHOUSE_PATH: "${TERRA_ARTIFACTS_DIR}/xhs49-1b_1p"  # Path to store the artifacts.
  OUTPUT_DIR: "${TERRA_ARTIFACTS_DIR}/xhs49-1b_1p"  # Path to store the artifacts.
  LOG_DIR: "${TERRA_ARTIFACTS_DIR}/xhs49-1b_1p"
  EXPERIMENT_NAME: "terra_xhs49-1b_1p"  # Name of the experiment.
  RUN_NAME: "run2_32bs_09995ema"  # Name of the run.

runner_script:
  RUNNER_SCRIPT: "${TERRA_REPO_DIR}/scripts/train_model_lsf_mpirun_sanger.sh"  # Path to the runner script.
  TRAINING_SCRIPT_PATH: "${TERRA_REPO_DIR}/src/terra/training/main.py"  # Path to the training script.
  BACKEND: "nccl"  # Backend for distributed training.
  CONFIG_FILE: "${TERRA_REPO_DIR}/configs/model/xhs49-1b_1p/xhs49-1b_1p.yaml"
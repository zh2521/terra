# UCE-style protein-embedding initialization for the gene-token
# embedding. Gene tokens (Ensembl IDs in the token dict) are sourced
# from a frozen ESM matrix and projected into `enc_emb_dim` by a
# learnable linear layer. Special tokens and gene tokens missing from
# the ESM file go through a separate learnable embedding table.
#
# Generate the embedding_path/mapping_path files via
# `terra-reproducibility/analysis/data_preparation/compute_protein_embeddings.py`
# before training. Setting `enabled: false` (or omitting the block
# entirely) restores the default learnable nn.Embedding.
protein_init:
  enabled: True
  embedding_path: '/lustre/scratch126/cellgen/lotfollahi/DATASETS/protein_embeddings/esm_c_600m_human.pt'
  mapping_path:   '/lustre/scratch126/cellgen/lotfollahi/DATASETS/protein_embeddings/esm_c_600m_human.json'
  proj_bias: False
